name: CI/CD

# Build, test, and run automated security checks on every push and PR.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write   # required for CodeQL / SARIF uploads

jobs:
  # ---------------------------------------------------------------------------
  # Backend: install, type-check, dependency audit
  # ---------------------------------------------------------------------------
  backend:
    name: Backend build & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: basobas_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: basobas_backend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Frontend: install, lint, build, dependency audit
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend build & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: basobas_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: basobas_frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # SECURITY: static analysis (CodeQL) for JS/TS
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------------
  # SECURITY: secret scanning (fails the build if a secret is committed)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # SECURITY: filesystem vulnerability + misconfiguration scan (Trivy)
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy vuln & config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"        # advisory: report but don't block the pipeline
          format: table

  # ---------------------------------------------------------------------------
  # Verify the Docker images build (reproducible setup)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./basobas_backend
          push: false
          tags: basobas-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./basobas_frontend
          push: false
          tags: basobas-frontend:ci
